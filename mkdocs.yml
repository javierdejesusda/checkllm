site_name: checkllm
site_description: The pytest of LLM testing
site_url: https://javierdejesusda.github.io/checkllm/
repo_url: https://github.com/javierdejesusda/checkllm
repo_name: javierdejesusda/checkllm
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - search.highlight

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Tutorials:
    - Overview: notebooks/index.md
  - Guides:
    - Choosing metrics: guides/choosing-metrics.md
    - Metrics reference: guides/metrics-reference.md
    - Deterministic Checks: guides/deterministic-checks.md
    - LLM Metrics: guides/llm-metrics.md
    - DAG metric: guides/dag-metric.md
    - RAG dataset generation: guides/rag-dataset-generation.md
    - Retriever validation: guides/retriever-validation.md
    - Guardrails: guides/guardrails.md
    - Exporting results: guides/exporting-results.md
    - Model-graded assertions: guides/model-graded-assertions.md
    - YAML config validation: guides/yaml-config-validation.md
    - CI/CD: guides/ci-cd.md
    - Custom Metrics: guides/custom-metrics.md
    - Plugins: guides/plugins.md
    - Configuration: guides/configuration.md
    - YAML Schema: guides/yaml-schema.md
    - CLI Reference: guides/cli-reference.md
    - Deployment: guides/deployment.md
    - Troubleshooting: guides/troubleshooting.md
    - Migration: guides/migration.md
    - Advanced Patterns: guides/advanced-patterns.md
    - "v5.1 New APIs": guides/v5.1-new-apis.md
  - Observability: observability.md
  - Red Teaming: red-teaming.md
  - Comparison: comparison.md
  - Benchmarks:
    - Competitor leaderboard: benchmarks/competitor-comparison.md
    - Cost and latency: benchmarks/cost-latency.md
    - Methodology: benchmarks/methodology.md
  - Release process: release-process.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
