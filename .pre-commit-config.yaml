repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args:
          - "--ignore-words-list=iff,nd,te,hist,ot,ist,ment,worl,bu,som,covert,strat,intoto,unparseable,re-use,socio-economic"
        exclude: |
          (?x)^(
            CHANGELOG\.md|
            requirements\.lock|
            .*\.lock|
            site/.*|
            editor/vscode/package-lock\.json
          )$

  - repo: local
    hooks:
      - id: check-no-ai-mentions
        name: Block AI/Claude/Anthropic mentions in staged files
        entry: scripts/check_no_ai_mentions.sh
        language: script
        pass_filenames: true
        exclude: |
          (?x)^(
            \.pre-commit-config\.yaml|
            scripts/check_no_ai_mentions\.sh|
            CLAUDE\.md|
            .*/CLAUDE\.md|
            \.claude/.*|
            docs/superpowers/.*
          )$
