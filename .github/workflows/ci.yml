name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=checkllm --cov-report=xml --cov-fail-under=75

      - name: Check CLI works
        run: checkllm --version

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Type check (mypy)
        run: python -m mypy src/checkllm/ --ignore-missing-imports --no-error-summary || true

      - name: Security scan (bandit)
        run: python -m bandit -r src/checkllm/ -c pyproject.toml --quiet --severity-level medium --exit-zero

  version-sync:
    name: Version sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tomli backport
        run: pip install tomli

      - name: Check version consistency
        run: python scripts/sync_version.py
