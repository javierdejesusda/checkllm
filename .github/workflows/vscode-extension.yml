name: VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - "editor/vscode/**"
      - ".github/workflows/vscode-extension.yml"
  pull_request:
    branches: [main]
    paths:
      - "editor/vscode/**"
      - ".github/workflows/vscode-extension.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editor/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Compile
        run: npm run compile

      - name: Smoke test
        run: xvfb-run -a npm test || npm test
